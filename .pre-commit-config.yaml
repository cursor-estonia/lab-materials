repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: markdown-toc
        name: Generate markdown table of contents
        entry: bash -c 'for f in "$@"; do mise exec -- markdown-toc -i --maxdepth 2 --bullets "-" "$f"; done' --
        language: system
        files: \.md$

      - id: markdownlint-cli2
        name: Lint and fix markdown
        entry: mise exec -- markdownlint-cli2 --fix
        language: system
        files: \.md$
